function updateTotal(comidas){
  var cal=0,p=0,c=0,g=0;
  Object.keys(selected).forEach(function(key){
    if(selected[key]==='custom'){
      var custom=getCustomMeal(key);
      if(custom){cal+=custom.cal;p+=custom.p;c+=custom.c;g+=custom.g;}
    } else if(comidas[key]&&comidas[key][selected[key]]){
      var o=comidas[key][selected[key]];
      cal+=o.cal;p+=o.p;c+=o.c;g+=o.g;
    }
  });
  document.getElementById('totalCal').textContent=cal+' kcal';
  document.getElementById('totalP').textContent='P:'+p+'g';
  document.getElementById('totalC').textContent='C:'+c+'g';

    for(var s=1;s<=numSeries;s++){html+='<div class="series-check"><input type="checkbox" id="s'+ei+'_'+s+'" onchange="toggleSerie(this)"><label for="s'+ei+'_'+s+'">Serie '+s+'</label></div>';}
    html+='</div>';
    var restSec=parseInt(ex.descanso)||60;

    html+='<div class="gym-weight-row"><label>Peso:</label><input type="number" step="0.5" id="gw_'+ei+'" placeholder="kg" value="'+(lastData?lastData.weight:'')+'">';

function toggleSerie(cb){
  var parent=cb.parentElement;
  if(cb.checked)parent.classList.add('done');
  else parent.classList.remove('done');
  var container=cb.closest('.series-checks');
  if(!container)return;
  var checks=container.querySelectorAll('input[type=checkbox]');
  var allDone=true;
  checks.forEach(function(c){if(!c.checked)allDone=false});
  var exName=container.dataset.exname;
  saveGymSeriesCompleted(DAYS[currentDay],exName,allDone);
}

function startTimer(seconds){
  var overlay=document.getElementById('timerOverlay');
  var display=document.getElementById('timerDisplay');
  var doneEl=document.getElementById('timerDone');
  overlay.classList.add('show');
  doneEl.style.display='none';
  display.style.display='block';
  var remaining=seconds;
  display.textContent=remaining;
  if(timerInterval)clearInterval(timerInterval);
  timerInterval=setInterval(function(){
    remaining--;
    display.textContent=remaining;
    if(remaining<=0){
      clearInterval(timerInterval);
      display.style.display='none';
      doneEl.style.display='block';
      if(navigator.vibrate)navigator.vibrate([200,100,200]);
      setTimeout(function(){overlay.classList.remove('show')},2000);
    }
  },1000);
}

function calcBMI(weightKg,heightCm){
  if(!heightCm||heightCm<100||!weightKg)return null;
  var hm=heightCm/100;
  return weightKg/(hm*hm);
}

function getBMICategory(bmi){
  if(bmi<18.5)return{label:'Bajo peso',cls:'green'};
  if(bmi<25)return{label:'Peso normal',cls:'green'};
  if(bmi<30)return{label:'Sobrepeso',cls:'yellow'};
  if(bmi<35)return{label:'Obesidad I',cls:'orange'};
  if(bmi<40)return{label:'Obesidad II',cls:'red'};
  return{label:'Obesidad III',cls:'red'};
}

function getBMIBarPosition(bmi){
  // Scale: 18 to 45 mapped to 0% to 100%
  var min=18,max=45;
  var pct=((bmi-min)/(max-min))*100;
  return Math.max(0,Math.min(100,pct));
}

function addWaterGlass(){
  var data=getWaterData();
  var height=getUserHeight();
  var weightData=getWeightData();
  var currentWeight=weightData.length>0?weightData[weightData.length-1].kg:STARTING_WEIGHT;
  var goalMl=Math.min(currentWeight*35,3500);
  var maxGlasses=Math.ceil(goalMl/250);
  if(data.glasses<maxGlasses){
    data.glasses++;
    saveWaterData(data);
    renderWaterSection(currentWeight);
  }
}

function removeWaterGlass(){
  var data=getWaterData();
  if(data.glasses>0){
    data.glasses--;
    saveWaterData(data);
    var weightData=getWeightData();
    var currentWeight=weightData.length>0?weightData[weightData.length-1].kg:STARTING_WEIGHT;
    renderWaterSection(currentWeight);
  }
}

  html+='<div class="water-glasses">';
  for(var i=0;i<totalGlasses;i++){
    html+='<div class="water-glass'+(i<data.glasses?' filled':'')+'" onclick="addWaterGlass()" ontouchstart=""></div>';
  }
  html+='</div>';
  html+='<div class="water-progress"><div class="water-progress-fill" style="width:'+pct+'%"></div></div>';

function drawWeightChart(data){
  var canvas=document.getElementById('weightChart');
  if(!canvas)return;
  var ctx=canvas.getContext('2d');
  var dpr=window.devicePixelRatio||1;
  var rect=canvas.getBoundingClientRect();
  canvas.width=rect.width*dpr;
  canvas.height=200*dpr;
  ctx.scale(dpr,dpr);
  var W=rect.width,H=200;
  var padL=40,padR=20,padT=20,padB=30;
  var chartW=W-padL-padR,chartH=H-padT-padB;
  ctx.clearRect(0,0,W,H);
  var vals=data.map(function(d){return d.kg});
  var minV=Math.min.apply(null,vals)-1;
  var maxV=Math.max.apply(null,vals)+1;
  if(maxV===minV){maxV+=1;minV-=1}
  var range=maxV-minV;
  var isDark=document.body.classList.contains('dark');
  ctx.strokeStyle=isDark?'#334155':'#e5e7eb';
  ctx.lineWidth=1;
  ctx.font='10px sans-serif';
  ctx.fillStyle=isDark?'#94a3b8':'#6b7280';
  ctx.textAlign='right';
  for(var i=0;i<=4;i++){
    var y=padT+chartH-chartH*(i/4);
    var v=(minV+range*(i/4)).toFixed(1);
    ctx.beginPath();ctx.moveTo(padL,y);ctx.lineTo(W-padR,y);ctx.stroke();
    ctx.fillText(v,padL-5,y+3);
  }
  ctx.textAlign='center';
  data.forEach(function(d,i){
    var x=padL+(chartW/(data.length-1||1))*i;
    ctx.fillText(d.date,x,H-5);
  });
  ctx.beginPath();
  ctx.strokeStyle='#7c3aed';
  ctx.lineWidth=2.5;
  ctx.lineJoin='round';
  data.forEach(function(d,i){
    var x=padL+(chartW/(data.length-1||1))*i;
    var y=padT+chartH-chartH*((d.kg-minV)/range);
    if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
  });
  ctx.stroke();
  ctx.fillStyle='#7c3aed';
  data.forEach(function(d,i){
    var x=padL+(chartW/(data.length-1||1))*i;
    var y=padT+chartH-chartH*((d.kg-minV)/range);
    ctx.beginPath();ctx.arc(x,y,4,0,Math.PI*2);ctx.fill();
  });
}

  Object.keys(MEAL_NAMES).forEach(function(key){

    if(meal&&meal.items){

  colacion1:['¡Colacion matutina! No te la saltes','¡Hora del snack! Mantén tu metabolismo activo','¡Recuerda tu colacion! Un boost de energia a media mañana'],

  cena:['¡Hora de cenar! Cierra bien el dia','¡A cenar! Una comida liviana para descansar mejor']
};

function getReminders(){
  var stored=localStorage.getItem('mealReminders');
  if(stored)return JSON.parse(stored);
  return JSON.parse(JSON.stringify(DEFAULT_REMINDERS));
}

function saveReminders(reminders){localStorage.setItem('mealReminders',JSON.stringify(reminders))}

function getLastNotified(){
  var stored=localStorage.getItem('lastNotified');
  return stored?JSON.parse(stored):{};
}

function setLastNotified(mealKey){
  var data=getLastNotified();
  data[mealKey]=new Date().toISOString().slice(0,16);
  localStorage.setItem('lastNotified',JSON.stringify(data));
}

function getRandomMessage(mealKey){
  var msgs=REMINDER_MESSAGES[mealKey]||['¡Hora de comer!'];
  return msgs[Math.floor(Math.random()*msgs.length)];
}

function sendMealNotification(mealKey,label){
  if(!('serviceWorker' in navigator)||!navigator.serviceWorker.controller)return;
  var emoji=REMINDER_EMOJIS[mealKey]||'🍽️';
  var msg=getRandomMessage(mealKey);
  navigator.serviceWorker.controller.postMessage({
    type:'SHOW_NOTIFICATION',
    title:emoji+' '+label,
    body:msg,
    tag:'meal-'+mealKey
  });
  setLastNotified(mealKey);
}

function checkMealReminders(){
  if(Notification.permission!=='granted')return;
  var reminders=getReminders();
  var now=new Date();
  var currentTime=String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
  var today=now.toISOString().slice(0,10);
  var lastNotified=getLastNotified();

  Object.keys(reminders).forEach(function(key){
    var reminder=reminders[key];
    if(!reminder.enabled)return;
    if(reminder.time!==currentTime)return;
    var lastKey=lastNotified[key];
    if(lastKey&&lastKey.startsWith(today)&&lastKey.endsWith(reminder.time))return;
    sendMealNotification(key,reminder.label);
  });
}

    html+='<div class="perm-status">✅ Notificaciones activadas</div>';
    html+='<button class="perm-btn granted" onclick="sendTestNotification()">Enviar prueba</button>';

  } else {
    html+='<div class="perm-status">Las notificaciones estan desactivadas</div>';
    html+='<button class="perm-btn" onclick="requestNotificationPermission()">🔔 Activar Notificaciones</button>';
  }
  html+='</div>';

  // Reminder cards for each meal
  Object.keys(DEFAULT_REMINDERS).forEach(function(key){
    var reminder=reminders[key];
    var emoji=REMINDER_EMOJIS[key];
    var isColacion=(key==='colacion1'||key==='colacion2');
    html+='<div class="reminder-card'+(isColacion?' colacion':'')+'">';
    html+='<h4>'+emoji+' '+reminder.label+(isColacion?' ⭐':'')+'</h4>';
    html+='<div class="reminder-row">';
    html+='<label>Hora:</label>';
    html+='<input type="time" value="'+reminder.time+'" onchange="updateReminderTime(\''+key+'\',this.value)">';
    html+='<label class="toggle-switch"><input type="checkbox" '+(reminder.enabled?'checked':'')+' onchange="toggleReminder(\''+key+'\',this.checked)"><span class="toggle-slider"></span></label>';
    html+='</div>';
    html+='</div>';
  });

  // Test button
  if(permStatus==='granted'){
    html+='<button class="reminder-test-btn" onclick="sendTestNotification()">🔔 Enviar notificacion de prueba</button>';
  }

  // Info box
  html+='<div class="reminder-info">';
  html+='<strong>💡 Tips:</strong><br>';
  html+='• Las colaciones estan marcadas con ⭐ para que no las olvides<br>';
  html+='• La app debe estar abierta (puede estar en segundo plano) para recibir notificaciones<br>';
  html+='• Configura los horarios segun tu rutina diaria<br>';
  html+='• Si no recibes notificaciones, verifica los permisos del navegador';
  html+='</div>';

  html+='</div>';
  el.innerHTML=html;
}

updateDayDisplay();
renderPeso();
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').then(function(reg){
    // Ensure SW is ready before checking reminders
    if(navigator.serviceWorker.controller){
      setTimeout(checkMealReminders,3000);
    }
    navigator.serviceWorker.addEventListener('controllerchange',function(){
      setTimeout(checkMealReminders,1000);
    });
  });
}
</script>
